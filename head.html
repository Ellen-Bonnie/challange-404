<!doctype html>
<html><head><meta charset="utf-8"><title>Migraine Year Tracker</title>
<link rel="stylesheet" href="style.css"></head>
<body>
<h2>Migraine Year Tracker</h2>
<button type="button" class="month-button" onclick="changeMonth(-1)" aria-label="Previous month">◀</button><span id="title"></span><button type="button" class="month-button" onclick="changeMonth(1)" aria-label="Next month">▶</button>
<button type="button" class="export-button" onclick="exportICS()">Export Apple/Google Calendar</button>
<div class="legend" aria-label="Choose an entry type">
  <button type="button" class="color-button" data-color="#fff200" aria-pressed="false">🟨 Headache 1</button>
  <button type="button" class="color-button" data-color="#ff5555" aria-pressed="false">🟥 Migraine 2</button>
  <button type="button" class="color-button" data-color="#8fd3ff" aria-pressed="false">🩵 Light headache</button>
  <button type="button" class="color-button note-button" data-action="note" aria-pressed="false">📝 Note</button>
</div>
<main class="calendar-layout">
  <section class="calendar-column">
    <div id=cal class=grid></div>
    <section id="noteEditor" class="note-editor" hidden>
      <label for="noteText">Note for <span id="noteDate"></span></label>
      <textarea id="noteText" rows="4" placeholder="Write a note for this day"></textarea>
      <button type="button" onclick="saveNote()">Save note</button>
    </section>
  </section>
  <aside class="insights-column">
    <section class="trend-section">
      <h3>Monthly trend</h3>
      <svg id="lineGraph" class="line-graph" viewBox="0 0 640 240" role="img" aria-label="Monthly migraine and headache trend"></svg>
    </section>
    <section class="month-summary">
      <h3>Month summary</h3>
      <div id="stats" class="summary-stats" aria-live="polite"></div>
    </section>
  </aside>
</main>
<script>
let d=new Date(), month=d.getMonth(), year=d.getFullYear(), color='', mode='color', selectedDate='', data=JSON.parse(localStorage.migraine||'{}');Object.values(data).forEach(entry=>{if(entry.c==='#800080')delete entry.c});
function selectButton(selectedButton){document.querySelectorAll('.color-button').forEach(button=>{let active=button===selectedButton;button.classList.toggle('selected',active);button.setAttribute('aria-pressed',active)})}
function pick(c,button){mode='color';color=c;selectButton(button)}
function pickNote(button){mode='note';color='';selectButton(button)}
document.querySelectorAll('.color-button').forEach(button=>button.onclick=()=>button.dataset.color?pick(button.dataset.color,button):pickNote(button));
function draw(){title.innerText=new Date(year,month).toLocaleString('default',{month:'long',year:'numeric'});cal.innerHTML='';
['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(x=>{let e=document.createElement('div');e.className='head';e.textContent=x;cal.appendChild(e)});
let first=(new Date(year,month,1).getDay()+6)%7, days=new Date(year,month+1,0).getDate();
for(let i=0;i<first;i++)cal.appendChild(document.createElement('div'));
for(let i=1;i<=days;i++){let e=document.createElement('div');e.className='day';e.textContent=i;let k=year+'-'+(month+1)+'-'+i;if(data[k]?.c)e.style.background=data[k].c;
if(data[k]?.n){let note=document.createElement('span');note.className='day-note';note.textContent=data[k].n;e.appendChild(note)}
let medication=document.createElement('label');medication.className='medication-control';medication.innerHTML='<input type="checkbox" aria-label="Medication taken on day '+i+'"><span aria-hidden="true">💊</span>';let medicationCheckbox=medication.querySelector('input');medicationCheckbox.checked=Boolean(data[k]?.med);medication.onclick=event=>event.stopPropagation();medicationCheckbox.onchange=()=>setMedication(k,medicationCheckbox.checked);e.appendChild(medication);
e.onclick=()=>{if(mode==='note')openNoteEditor(k,new Date(year,month,i));else if(color){data[k]={...data[k],c:color};save();draw()}};cal.appendChild(e)}drawLineGraph();drawMonthSummary()}
function setMedication(key,taken){if(taken)data[key]={...data[key],med:true};else if(data[key]){delete data[key].med;if(!data[key].c&&!data[key].n)delete data[key]}save();draw()}
function openNoteEditor(key,date){selectedDate=key;document.getElementById('noteDate').textContent=date.toLocaleDateString();let field=document.getElementById('noteText');field.value=data[key]?.n||'';document.getElementById('noteEditor').hidden=false;field.focus()}
function saveNote(){if(!selectedDate)return;let text=document.getElementById('noteText').value.trim();if(text)data[selectedDate]={...data[selectedDate],n:text};else if(data[selectedDate]){delete data[selectedDate].n;if(!data[selectedDate].c&&!data[selectedDate].med)delete data[selectedDate]}document.getElementById('noteEditor').hidden=true;save();draw()}
function save(){localStorage.migraine=JSON.stringify(data)}
function changeMonth(x){month+=x;if(month<0){month=11;year--}if(month>11){month=0;year++}draw()}
function drawMonthSummary(){let categories=[['#fff200','Headache 1','headache-one'],['#ff5555','Migraine 2','migraine-two'],['#8fd3ff','Light headache','light-headache']];let stats=document.getElementById('stats');stats.textContent='';categories.forEach(([color,label,kind])=>{let count=Object.entries(data).filter(([key,entry])=>{let [entryYear,entryMonth]=key.split('-').map(Number);return entryYear===year&&entryMonth===month+1&&entry.c===color}).length;let card=document.createElement('div');card.className='summary-card';card.innerHTML='<span class="summary-swatch '+kind+'"></span><strong>'+count+'</strong><span>'+label+'</span>';stats.appendChild(card)})}
function drawLineGraph(){let values=Array(12).fill(0);Object.entries(data).forEach(([key,value])=>{let [entryYear,entryMonth]=key.split('-').map(Number);if(entryYear===year&&value.c)values[entryMonth-1]++});let max=Math.max(1,...values),width=640,height=240,left=38,bottom=30,top=18,right=12,plotWidth=width-left-right,plotHeight=height-top-bottom;let point=(value,index)=>[left+(plotWidth/11)*index,top+plotHeight-(value/max)*plotHeight];let path=values.map((value,index)=>{let [x,y]=point(value,index);return `${index?'L':'M'}${x.toFixed(1)},${y.toFixed(1)}`}).join(' ');let labels=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];lineGraph.innerHTML=`<line class="graph-axis" x1="${left}" y1="${top}" x2="${left}" y2="${height-bottom}"/><line class="graph-axis" x1="${left}" y1="${height-bottom}" x2="${width-right}" y2="${height-bottom}"/><text class="graph-label" x="4" y="${top+8}">${max}</text><text class="graph-label" x="12" y="${height-bottom+4}">0</text><path class="graph-line" d="${path}"/>${values.map((value,index)=>{let [x,y]=point(value,index);return `<circle class="graph-point" cx="${x}" cy="${y}" r="4"><title>${labels[index]}: ${value}</title></circle><text class="graph-label" text-anchor="middle" x="${x}" y="${height-8}">${labels[index]}</text>`}).join('')}`}
function exportICS(){let s='BEGIN:VCALENDAR\nVERSION:2.0\n';Object.entries(data).forEach(([k,v])=>{if(v.c){let date=k.replaceAll('-','');s+=`BEGIN:VEVENT\nDTSTART:${date}\nSUMMARY:${v.c=='#ff5555'?'Migraine':v.c=='#fff200'?'Headache':'Light headache'}\nDESCRIPTION:${v.n||''}${v.med?' Medication taken':''}\nEND:VEVENT\n`}});s+='END:VCALENDAR';let b=new Blob([s],{type:'text/calendar'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='migraine-calendar.ics';a.click()}
draw();
</script></body></html>
