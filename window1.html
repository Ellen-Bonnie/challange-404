<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Parse XML (Final Standard Format)</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #fafafa; }
    textarea { width: 100%; height: 260px; }
    #result { white-space: pre; border:1px solid #ccc; padding:10px; background:#fff; margin-top:15px; }
    button { padding:8px 20px; margin:5px; font-weight:bold; cursor:pointer; }
  </style>
</head>
<body>

<h2>User Chart XML Formatter</h2>

<textarea id="xmlInput" placeholder="Paste XML here or drop file..."></textarea><br>
<input type="file" id="fileInput" hidden accept=".xml"/>
<button onclick="document.getElementById('fileInput').click()">Load XML File</button>
<button onclick="parseXML()">Parse</button>
<button onclick="downloadTextFile()">Download .txt</button>
<button onclick="copyParsed()">Copy</button>

<div id="result"></div>

<script>
let parsedOutput = "";

/* ---------- HELPERS ---------- */
function toDM(deg, isLat) {
    const abs = Math.abs(deg);
    const d = Math.floor(abs);
    const m = (abs - d) * 60;
    const dir = deg >= 0 ? (isLat ? "N" : "E") : (isLat ? "S" : "W");
    const dStr = (d < 10 ? "0" : "") + d;
    let [mi, md] = m.toFixed(3).split(".");
    mi = mi.padStart(2,"0");
    return `${dStr}°${mi}.${md}′ ${dir}`;
}
function bearingDegrees(lat1, lon1, lat2, lon2) {
    const R = x => x * Math.PI/180;
    const a = R(lat1), b = R(lat2), d = R(lon2-lon1);
    const y = Math.sin(d)*Math.cos(b);
    const x = Math.cos(a)*Math.sin(b)-Math.sin(a)*Math.cos(b)*Math.cos(d);
    return Math.round((Math.atan2(y,x)*180/Math.PI+360)%360);
}
function minutesToHHMM(m){
    m = parseInt(m); if(isNaN(m)) return "";
    return String(Math.floor(m/60)).padStart(2,"0")+":"+
           String(m%60).padStart(2,"0");
}

/* ---------- MAIN PARSE ---------- */
function parseXML(){
    const xml = document.getElementById("xmlInput").value.trim();
    if(!xml) return alert("Paste XML first.");
    let doc;
    try { doc = new DOMParser().parseFromString(xml,"application/xml"); }
    catch(e){ return alert("Invalid XML."); }
    if (doc.getElementsByTagName("parsererror").length) return alert("XML Parse Error.");

    let out = "";
    const root = doc.getElementsByTagName("userchart")[0] || doc;

    /* -------- LINE -------- */
    const lineMap = {1:"Coast line",2:"Nav line",3:"Route line",4:"Depth line"};
    const lines = root.getElementsByTagName("line");
    let n=0;
    for(const el of lines){
        n++;
        const name = el.getAttribute("name")||"(No name)";
        out += `${n} "${name}"\n`;

        const a = el.querySelector("attribute");
        const t = a ? a.getAttribute("lineType") : "";
        let line = lineMap[t] || "";

        const typeNode = el.querySelector("type");
        if(typeNode){
            if(typeNode.getAttribute("displayRadar")==="1") line += "   On Radar";
            if(typeNode.getAttribute("checkDanger")==="1") line += "   Danger";
        }
        out += `    ${line.trim()}\n`;

        for(const v of el.getElementsByTagName("vertex")){
            const lat=parseFloat(v.getAttribute("latitude"));
            const lon=parseFloat(v.getAttribute("longitude"));
            if(!isNaN(lat)&&!isNaN(lon))
                out+=`    ${toDM(lat,true)} ${toDM(lon,false)}\n`;
        }
        out+="\n";
    }

    /* -------- CLEARING -------- */
    const clr = root.getElementsByTagName("clearingLine");
    if(clr.length){
        out+="Clearing Lines\n\n";
        let i=0;
        for(const el of clr){
            i++;
            const name = el.getAttribute("name") || "(No name)";
            out += `  ${i} "${name}"\n`;

            const a = el.querySelector("attribute");
            let t = a ? a.getAttribute("lineType") : "";
            t = t==="1"?"NMT":t==="2"?"NLT":t;

            const verts = el.getElementsByTagName("vertex");
            let dir="";
            if(verts.length>=2){
                let v1=verts[0], v2=verts[verts.length-1];
                dir = bearingDegrees(+v1.getAttribute("latitude"),+v1.getAttribute("longitude"),
                                     +v2.getAttribute("latitude"),+v2.getAttribute("longitude"))+"°";
            }

            let line = `${t}`;
            if(dir) line+=`   ${dir}`;

            const tNode = el.querySelector("type");
            if(tNode){
                if(tNode.getAttribute("displayRadar")==="1") line+="   On Radar";
                if(tNode.getAttribute("isDanger")==="1") line+="   Danger";
            }
            out+=`    ${line}\n`;

            for(const v of verts){
                const lat=parseFloat(v.getAttribute("latitude"));
                const lon=parseFloat(v.getAttribute("longitude"));
                if(!isNaN(lat)&&!isNaN(lon))
                    out+=`    ${toDM(lat,true)} ${toDM(lon,false)}\n`;
            }
            out+="\n";
        }
    }

    /* -------- TIDAL -------- */
    const tidal = root.getElementsByTagName("tidal");
    if(tidal.length){
        out+="Tidals\n\n";
        let i=0;
        for(const el of tidal){
            i++;
            const name = el.getAttribute("name")||"(No name)";
            out+=`  ${i} "${name}"\n`;

            const a = el.querySelector("attribute");
            let time = a? minutesToHHMM(a.getAttribute("time")) : "";
            let o=a?a.getAttribute("orientation"):""; o=o?parseFloat(o).toFixed(2)+"°":"";
            let s=a?a.getAttribute("strength"):""; s=s?parseFloat(s).toFixed(2):"";
            let t=a?a.getAttribute("type"):""; t=t==="1"?"Current":t==="2"?"Predicted":"";

            let line = `TIDAL`;
            if(time) line+=`   ${time}`;
            if(o) line+=`   ${o}`;
            if(s) line+=`   ${s}`;
            if(t) line+=`   ${t}`;

            out+=`    ${line}\n`;

            for(const v of el.getElementsByTagName("vertex")){
                const lat=parseFloat(v.getAttribute("latitude"));
                const lon=parseFloat(v.getAttribute("longitude"));
                if(!isNaN(lat)&&!isNaN(lon))
                    out+=`    ${toDM(lat,true)} ${toDM(lon,false)}\n`;
            }
            out+="\n";
        }
    }

    parsedOutput = out;
    document.getElementById("result").textContent = out;
}

/* ---------- FILE / COPY ---------- */
function readXMLFile(f){
    const r=new FileReader();
    r.onload=e=>{ document.getElementById("xmlInput").value=e.target.result; parseXML(); };
    r.readAsText(f);
}
document.getElementById("fileInput").addEventListener("change",e=>{
    if(e.target.files[0]) readXMLFile(e.target.files[0]);
});
function copyParsed(){ if(parsedOutput) navigator.clipboard.writeText(parsedOutput); }
function downloadTextFile(){
    if(!parsedOutput) return;
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([parsedOutput],{type:"text/plain"}));
    a.download="parsed_coordinates.txt"; a.click();
}
</script>

</body>
</html>
